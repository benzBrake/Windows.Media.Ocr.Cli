name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: nuget restore Windows.Media.Ocr.Cli.sln

      - name: Build Release
        run: msbuild Windows.Media.Ocr.Cli.sln /t:Build /p:Configuration=Release /m

      - name: Package Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path Windows.Media.Ocr.Cli/bin/Release/* -DestinationPath dist/Windows.Media.Ocr.Cli-${{ github.ref_name }}.zip -Force

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows.Media.Ocr.Cli-Release
          path: Windows.Media.Ocr.Cli/bin/Release/
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Windows.Media.Ocr.Cli-${{ github.ref_name }}.zip
